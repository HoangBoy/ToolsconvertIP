<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Proxy Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260406-1">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="app">
    <header class="hero">
      <p class="chip">Super Proxy Format Toolkit</p>
      <h1>Convert nhiều định dạng proxy sang chuẩn import</h1>
      <p>
        Dán dữ liệu thô vào bên dưới. Tool tự nhận diện nhiều định dạng gồm:
        <strong>ip:port:user:pass</strong>,
        <strong>user:pass@ip:port</strong>,
        và dòng chuẩn có <strong>protocol://...</strong>.
      </p>
    </header>

    <section class="panel">
      <div class="panel-head">
        <h2>Input</h2>
        <div class="controls-inline">
          <label for="protocol">Protocol xuất</label>
          <select id="protocol">
            <option value="http">http</option>
            <option value="https">https</option>
            <option value="socks5">socks5</option>
          </select>
        </div>
      </div>

      <textarea id="input" placeholder="Ví dụ:\n209.38.173.242:31112:user:pass\nproxymart29366:ygHRrKyO@161.248.212.20:29366"></textarea>

      <div class="options">
        <label>
          <input type="checkbox" id="keepNames" checked>
          Giữ tên có sẵn nếu input đã có \"name\"
        </label>
      </div>

      <div class="actions">
        <button id="convertBtn" class="btn primary">Convert</button>
        <button id="clearBtn" class="btn">Xóa</button>
        <button id="copyBtn" class="btn">Copy Output</button>
        <button id="downloadBtn" class="btn">Tải file .txt</button>
      </div>

      <div id="stats" class="stats">Chưa có dữ liệu.</div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Output chuẩn Super Proxy</h2>
      </div>
      <textarea id="output" readonly placeholder="# superproxy:proxylist:v1"></textarea>
    </section>
  </main>

  <script src="app.js?v=20260406-1"></script>
</body>
</html>
